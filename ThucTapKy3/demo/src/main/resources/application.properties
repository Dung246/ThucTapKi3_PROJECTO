spring.application.name=demo
server.port=8080

# MySQL runs via docker-compose (see docker-compose.yml), host port 3307 -> container 3306
spring.datasource.url=jdbc:mysql://localhost:3307/sales_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Day 1: let Hibernate create/update the schema from entities; revisit (e.g. Flyway) once schema stabilizes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (Day 2). Local-dev secret only; override via JWT_SECRET env var for any non-local deployment.
jwt.secret=${JWT_SECRET:fYrcOOxiFLiF2Tb1RnON6fx27kBOhDh7za2A0SFdubk3AMSjh7Dz/B0t2M+7b8Je}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Product image uploads: local Docker volume, resolves the long-pending "product image storage"
# decision (see docs.txt KEY DECISIONS). "uploads" (relative) by default for host-side
# `./gradlew bootRun`; docker-compose overrides APP_UPLOAD_DIR to /app/uploads (a mounted named
# volume) for the containerized backend - same env-var-override-over-profile-file pattern already
# used for the datasource.
app.upload.dir=${APP_UPLOAD_DIR:uploads}
# Set comfortably above ProductService.uploadImage()'s own 5MB check so that check - not Spring's
# multipart resolver - is what normally produces the clean "file too large" error message.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
