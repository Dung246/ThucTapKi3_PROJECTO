server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing, so any path that isn't a real static file
    # (e.g. a refresh on /admin/orders/5) must fall back to index.html instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
